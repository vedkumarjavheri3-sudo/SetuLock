name: Frontend CI

on:
  push:
    branches: [ "main", "staging" ]
    paths:
      - 'setulock-citizen-app/**'
  pull_request:
    branches: [ "main", "staging" ]
    paths:
      - 'setulock-citizen-app/**'

defaults:
  run:
    working-directory: ./setulock-citizen-app

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './setulock-citizen-app/package-lock.json'
        
    - name: Setup Expo
      uses: expo/expo-github-action@v8
      with:
        expo-version: latest
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        
    - name: Install dependencies
      run: npm ci
      
    - name: Typecheck and Lint
      run: npm run lint --if-present
      
    - name: EAS Update/Build verification
      # We check config validity as a rudimentary test
      run: npx expo validate
